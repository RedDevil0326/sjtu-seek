    function openComposer(postId = null) {
      editingPostId = postId;
      composerImages = [];
      dom.postImagePreview.innerHTML = "";
      $("#composerTitle").textContent = postId ? "编辑可见范围" : "发布需求";
      const post = postId ? state.posts.find(p => p.id === postId) : null;
      dom.postTitle.value = post ? post.title : "";
      dom.postBody.value = post ? post.body : "";
      dom.postTags.value = post ? post.tags.map(t => "#" + t).join(" ") : "";
      dom.postZone.value = post ? normalizeCampus(post.zone) : "闵行校区";
      composerImages = post ? [...post.images] : [];
      renderPostImagePreview();
      const visibility = post ? post.visibility : { type: "all", hiddenIds: [] };
      $$("input[name='visibility']").forEach(radio => radio.checked = radio.value === visibility.type);
      renderHiddenContacts(visibility.hiddenIds || []);
      toggleHiddenContacts();
      dom.composerModal.classList.add("open");
    }

    function closeComposer() {
      dom.composerModal.classList.remove("open");
      editingPostId = null;
    }

    function readPostImages() {
      const files = Array.from(dom.postImagesInput.files || []).slice(0, 6);
      if (!files.length) return;
      Promise.all(files.map(file => new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.readAsDataURL(file);
      }))).then(images => {
        composerImages = composerImages.concat(images).slice(0, 6);
        renderPostImagePreview();
      });
    }

    function renderPostImagePreview() {
      dom.postImagePreview.innerHTML = composerImages.map(src => `<img src="${src}" alt="帖子配图预览">`).join("");
    }

    function parseTags(raw, title, body) {
      const tags = raw.split(/[\s,，#]+/).map(t => t.trim()).filter(Boolean);
      const text = title + body;
      const map = [
        ["搭子", ["搭子", "一起", "游泳", "跑步", "吃饭"]],
        ["组队", ["组队", "队友", "比赛", "建模", "项目"]],
        ["二手", ["二手", "出", "转让", "闲置", "电动车"]],
        ["求助", ["求助", "帮忙", "请问", "借", "找不到"]]
      ];
      map.forEach(([tag, words]) => {
        if (words.some(word => text.includes(word)) && !tags.includes(tag)) tags.unshift(tag);
      });
      return [...new Set(tags.length ? tags : ["求助"])];
    }

    function getVisibilityFromForm() {
      const type = $("input[name='visibility']:checked").value;
      const hiddenIds = type === "hide" ? Array.from(dom.hiddenContactList.querySelectorAll("input:checked")).map(i => i.value) : [];
      return { type, hiddenIds };
    }

    async function publishPost() {
      const title = dom.postTitle.value.trim();
      const body = dom.postBody.value.trim();
      if (!title || !body) return showToast("标题和正文都要写一下。");
      if (editingPostId) {
        const post = state.posts.find(p => p.id === editingPostId);
        if (!post || post.authorId !== state.currentUser) return;
        Object.assign(post, {
          title, body, zone: dom.postZone.value, images: composerImages,
          tags: parseTags(dom.postTags.value, title, body),
          visibility: getVisibilityFromForm()
        });
        save();
        if (post._remote && supabaseApi()) {
          try {
            await supabaseApi().updatePost(state.currentUser, post.id, post);
            await loadRemotePosts();
          } catch (error) {
            showToast(error.message || "更新远程帖子失败。");
          }
        }
        closeComposer();
        renderAll();
        showToast("帖子已更新。");
        openPostDetail(post.id, false);
        return;
      }
      const post = {
        id: "p-" + Date.now(),
        authorId: state.currentUser,
        title, body,
        tags: parseTags(dom.postTags.value, title, body),
        zone: dom.postZone.value,
        images: composerImages,
        createdAt: Date.now(),
        likes: [],
        favorites: [],
        views: 0,
        visibility: getVisibilityFromForm()
      };
      state.posts.unshift(post);
      save();
      if (state.auth.loggedIn && supabaseApi()) {
        try {
          await supabaseApi().createPost(state.currentUser, post);
          await loadRemotePosts();
        } catch (error) {
          showToast(error.message || "发布到 Supabase 失败，已暂存在本地。");
        }
      }
      closeComposer();
      switchTab("plaza");
      showToast("发布成功，正在等待恰好的回应。");
    }

    function visiblePosts() {
      const keyword = dom.searchInput.value.trim().toLowerCase();
      const zone = dom.zoneSelect.value;
      const sorted = state.posts.filter(post => {
        if (!canSee(post)) return false;
        const text = [post.title, post.body, post.tags.join(" "), userById(post.authorId).name].join(" ").toLowerCase();
        return (!keyword || text.includes(keyword))
          && (activeTag === "全部" || post.tags.includes(activeTag))
          && (zone === "全部" || post.zone === zone);
      });
      return sorted.sort((a, b) => {
        if (dom.sortSelect.value === "hot") return heat(b) - heat(a) || b.createdAt - a.createdAt;
        return b.createdAt - a.createdAt;
      });
    }

    function canSee(post) {
      if (post.authorId === state.currentUser) return true;
      if (!post.visibility || post.visibility.type === "all") return true;
      if (post.visibility.type === "self") return false;
      if (post.visibility.type === "hide") return !(post.visibility.hiddenIds || []).includes(state.currentUser);
      return true;
    }

    function heat(post) { return (post.likes || []).length; }
    function isLiked(post) { return (post.likes || []).includes(state.currentUser); }
    function isFav(post) { return (post.favorites || []).includes(state.currentUser); }

    function renderPosts() {
      if (!dom.postList) return;
      const posts = visiblePosts();
      dom.postList.innerHTML = posts.length ? posts.map(postCardHtml).join("") : `<div class="empty">暂时没有匹配的需求，换个关键词或标签试试。</div>`;
    }

    function postCardHtml(post, small = false) {
      const author = userById(post.authorId);
      const imgs = post.images && post.images.length ? `<div class="thumbs">${post.images.slice(0, 3).map(src => `<img src="${src}" alt="帖子配图">`).join("")}</div>` : "";
      if (small) {
        return `<article class="small-card" data-open-post="${post.id}">
          <h4>${escapeHtml(post.title)}</h4>
          <p>${escapeHtml(post.body.slice(0, 58))}${post.body.length > 58 ? "..." : ""}</p>
        </article>`;
      }
      return `
        <article class="post-card" data-open-post="${post.id}">
          <div class="post-head">
            <div class="author">
              <img class="avatar-md" src="${author.avatar}" alt="${escapeHtml(author.name)}">
              <div><strong>${escapeHtml(author.name)}</strong><span>${timeAgo(post.createdAt)} · ${post.zone}</span></div>
            </div>
            <span class="meta">浏览 ${post.views || 0}</span>
          </div>
          <h3 class="post-title">${escapeHtml(post.title)}</h3>
          <div class="post-body-preview">${escapeHtml(post.body)}</div>
          ${imgs}
          <div class="post-tags">${post.tags.map(tag => `<button class="tag" data-search-tag="${escapeHtml(tag)}">#${escapeHtml(tag)}</button>`).join("")}</div>
          <div class="stats"><span>热度 ${heat(post)}</span><span>${isFav(post) ? "已收藏" : "未收藏"}</span></div>
          <div class="post-actions">
            <button class="mini-btn active" data-action="respond" data-id="${post.id}">我来</button>
            <button class="mini-btn ${isFav(post) ? "active" : ""}" data-action="fav" data-id="${post.id}">☆</button>
            <button class="mini-btn ${isLiked(post) ? "active" : ""}" data-action="like" data-id="${post.id}">♡</button>
          </div>
        </article>`;
    }

    function handlePostListClick(event) {
      const actionBtn = event.target.closest("[data-action]");
      if (actionBtn) {
        event.stopPropagation();
        handlePostAction(actionBtn.dataset.action, actionBtn.dataset.id);
        return;
      }
      const tagBtn = event.target.closest("[data-search-tag]");
      if (tagBtn) {
        event.stopPropagation();
        dom.searchPanel.classList.add("open");
        dom.searchInput.value = tagBtn.dataset.searchTag;
        recordSearch(tagBtn.dataset.searchTag, true);
        renderAll();
        return;
      }
      const card = event.target.closest("[data-open-post]");
      if (card) openPostDetail(card.dataset.openPost, true);
    }

    async function handlePostAction(action, postId) {
      const post = state.posts.find(p => p.id === postId);
      if (!post) return;
      if (action === "respond") return openChatWith(post.authorId, `你好，我看到你发布的「${post.title}」，我可以来回应。`);
      if (action === "fav") toggleArray(post.favorites, state.currentUser, "已加入我的收藏。", "已取消收藏。");
      if (action === "like") toggleArray(post.likes, state.currentUser, "点赞成功，热度提升。", "已取消点赞。");
      save();
      if (post._remote && supabaseApi()) {
        try {
          if (action === "fav") await supabaseApi().setFavorite(state.currentUser, post.id, isFav(post));
          if (action === "like") await supabaseApi().setLike(state.currentUser, post.id, isLiked(post));
        } catch (error) {
          showToast(error.message || "同步点赞/收藏失败。");
        }
      }
      renderAll();
      if (dom.detailPage.classList.contains("open")) renderDetail(post.id);
    }

    function toggleArray(arr, value, addText, removeText) {
      const index = arr.indexOf(value);
      if (index >= 0) {
        arr.splice(index, 1);
        showToast(removeText);
      } else {
        arr.push(value);
        showToast(addText);
      }
    }

    function openPostDetail(postId, countView) {
      const post = state.posts.find(p => p.id === postId);
      if (!post || !canSee(post)) return showToast("这条帖子暂时不可见。");
      if (countView) {
        post.views = (post.views || 0) + 1;
        state.history = [postId, ...state.history.filter(id => id !== postId)].slice(0, 60);
        save();
        if (post._remote && supabaseApi()) supabaseApi().incrementView(post.id).catch(() => {});
      }
      renderDetail(postId);
      dom.detailPage.classList.add("open");
      renderAll();
    }

    function renderDetail(postId) {
      const post = state.posts.find(p => p.id === postId);
      if (!post) return;
      const author = userById(post.authorId);
      const own = post.authorId === state.currentUser;
      const imgs = post.images && post.images.length ? `<div class="detail-images">${post.images.map(src => `<img src="${src}" alt="帖子配图">`).join("")}</div>` : "";
      dom.detailContent.innerHTML = `
        <article class="detail-sheet">
          <div class="author">
            <img class="avatar-md" src="${author.avatar}" alt="${escapeHtml(author.name)}">
            <div><strong>${escapeHtml(author.name)}</strong><span>${timeAgo(post.createdAt)} · ${post.zone} · 浏览 ${post.views || 0}</span></div>
          </div>
          <h2>${escapeHtml(post.title)}</h2>
          <div class="post-tags">${post.tags.map(tag => `<span class="tag">#${escapeHtml(tag)}</span>`).join("")}</div>
          <div class="detail-body">${escapeHtml(post.body)}</div>
          ${imgs}
          <div class="detail-actions">
            <button class="mini-btn active" data-detail-action="respond" data-id="${post.id}">私信</button>
            <button class="mini-btn ${isFav(post) ? "active" : ""}" data-detail-action="fav" data-id="${post.id}">收藏 ${post.favorites.length}</button>
            <button class="mini-btn ${isLiked(post) ? "active" : ""}" data-detail-action="like" data-id="${post.id}">点赞 ${post.likes.length}</button>
          </div>
          ${own ? `<div class="detail-actions" style="grid-template-columns:1fr 1fr;margin-top:8px;">
            <button class="mini-btn" data-detail-action="edit" data-id="${post.id}">编辑帖子</button>
            <button class="mini-btn danger" data-detail-action="delete" data-id="${post.id}">删除帖子</button>
          </div>` : ""}
        </article>`;
      dom.detailContent.onclick = event => {
        const btn = event.target.closest("[data-detail-action]");
        if (!btn) return;
        const action = btn.dataset.detailAction;
        if (action === "delete") deletePost(btn.dataset.id);
        else if (action === "edit") openComposer(btn.dataset.id);
        else handlePostAction(action, btn.dataset.id);
      };
    }

    async function deletePost(postId) {
      const post = state.posts.find(p => p.id === postId);
      if (!post || post.authorId !== state.currentUser) return;
      if (!confirm("确认删除这条帖子吗？删除后全平台都会消失。")) return;
      state.posts = state.posts.filter(p => p.id !== postId);
      state.history = state.history.filter(id => id !== postId);
      save();
      if (post._remote && supabaseApi()) {
        try {
          await supabaseApi().deletePost(post.id);
        } catch (error) {
          showToast(error.message || "删除远程帖子失败。");
        }
      }
      dom.detailPage.classList.remove("open");
      renderAll();
      showToast("帖子已删除，相关记录已同步移除。");
    }

    function recordSearch(value, force = false) {
      const term = value.trim();
      if (!term || (!force && term.length < 2)) return;
      state.searchStats[term] = (state.searchStats[term] || 0) + 1;
      save();
    }

    function renderHotSearches() {
      const words = Object.entries(state.searchStats || {}).sort((a, b) => b[1] - a[1]).slice(0, 5).map(([word]) => word);
      dom.hotSearches.innerHTML = words.map(word => `<button class="chip" data-hot="${escapeHtml(word)}">${escapeHtml(word)}</button>`).join("");
      dom.hotSearches.onclick = event => {
        const btn = event.target.closest("[data-hot]");
        if (!btn) return;
        dom.searchInput.value = btn.dataset.hot;
        recordSearch(btn.dataset.hot, true);
        renderAll();
      };
    }

    function handleTagFilter(event) {
      const btn = event.target.closest("[data-tag]");
      if (!btn) return;
      activeTag = btn.dataset.tag;
      $$("#tagFilters .chip").forEach(item => item.classList.toggle("active", item === btn));
      renderPosts();
    }

    function chatIdFor(userId) { return ["me", userId].sort().join("-"); }

    function getChat(userId) {
      const id = chatIdFor(userId);
      let chat = state.chats.find(c => c.id === id);
      if (!chat) {
        chat = { id, participants: [state.currentUser, userId], updatedAt: Date.now(), messages: [] };
        state.chats.push(chat);
      }
      return chat;
    }

    async function openChatWith(userId, seedText = "") {
      if (userId === state.currentUser) return showToast("这是你自己发布的帖子。");
      activeChatUserId = userId;
      const chat = getChat(userId);
      if (seedText && !chat.messages.some(m => m.text === seedText)) {
        chat.messages.push({ from: state.currentUser, text: seedText, at: Date.now() });
        chat.updatedAt = Date.now();
        save();
      }
      const other = userById(userId);
      dom.chatAvatar.src = other.avatar;
      dom.chatName.textContent = other.name;
      dom.chatSubtitle.textContent = publicProfileText(other) || "校园互助私信";
      if (messagesRealtimeChannel && supabaseApi()) {
        supabaseApi().removeChannel(messagesRealtimeChannel);
        messagesRealtimeChannel = null;
      }
      activeRemoteConversationId = null;
      if (state.auth.loggedIn && supabaseApi() && isUuid(userId)) {
        try {
          const conversation = await supabaseApi().getOrCreateConversation(userId);
          activeRemoteConversationId = conversation.id;
          const rows = await supabaseApi().listMessages(conversation.id);
          chat.messages = rows.map(mapRemoteMessage);
          if (seedText && !chat.messages.some(m => m.text === seedText)) {
            await supabaseApi().sendMessage(conversation.id, { type: "text", text: seedText });
            chat.messages.push({ from: state.currentUser, type: "text", text: seedText, at: Date.now(), _remote: true });
          }
          messagesRealtimeChannel = supabaseApi().subscribeMessages(conversation.id, async () => {
            const latest = await supabaseApi().listMessages(conversation.id);
            chat.messages = latest.map(mapRemoteMessage);
            save();
            renderChat();
            renderMessages();
          });
          save();
        } catch (error) {
          showToast(error.message || "打开远程私信失败，已使用本地会话。");
        }
      }
      renderChat();
      dom.chatPage.classList.add("open");
      dom.appScreen.classList.add("chat-open");
      switchTab("messages");
    }

    function closeChat() {
      dom.chatPage.classList.remove("open");
      dom.appScreen.classList.remove("chat-open");
      if (messagesRealtimeChannel && supabaseApi()) {
        supabaseApi().removeChannel(messagesRealtimeChannel);
        messagesRealtimeChannel = null;
      }
      activeChatUserId = null;
      activeRemoteConversationId = null;
      clearPendingAttachment();
      stopVoiceVisual();
    }

    function renderChat() {
      if (!activeChatUserId) return;
      const chat = getChat(activeChatUserId);
      dom.chatMessages.innerHTML = `<div class="chat-day">今天</div>` + (chat.messages.map(msg => `
        <div class="bubble-row ${msg.from === state.currentUser ? "me" : ""}">
          ${msg.from === state.currentUser ? "" : `<img class="avatar-sm" src="${userById(msg.from).avatar}" alt="">`}
          ${messageBubbleHtml(msg)}
        </div>
      `).join("") || `<div class="empty">还没有消息，发一句开始沟通吧。</div>`);
      setTimeout(() => dom.chatMessages.scrollTop = dom.chatMessages.scrollHeight, 0);
    }

    function messageBubbleHtml(msg) {
      const type = msg.type || "text";
      if (type === "image") {
        return `<div class="bubble image-bubble"><img class="chat-image" src="${msg.data}" alt="${escapeHtml(msg.name || "聊天图片")}"></div>`;
      }
      if (type === "file") {
        return `<div class="bubble file-bubble"><span class="file-icon">文</span><span class="file-meta"><strong>${escapeHtml(msg.name || "文件")}</strong><span>${formatFileSize(msg.size || 0)}</span></span></div>`;
      }
      if (type === "voice") {
        return `<div class="bubble voice-bubble"><span class="voice-icon">声</span><strong>${msg.duration || 1}"</strong><span>语音消息</span></div>`;
      }
      return `<div class="bubble">${escapeHtml(msg.text || "")}</div>`;
    }

    function sendChat() {
      const text = dom.chatInput.value.trim();
      if (!activeChatUserId) return;
      const chat = getChat(activeChatUserId);
      const attachment = pendingChatAttachment;
      if (!text && !attachment) return;
      if (attachment) {
        chat.messages.push({ from: state.currentUser, at: Date.now(), ...attachment });
        if (activeRemoteConversationId && supabaseApi()) {
          supabaseApi().sendMessage(activeRemoteConversationId, attachment).catch(error => showToast(error.message || "远程附件发送失败。"));
        }
        clearPendingAttachment();
      }
      if (text) {
        chat.messages.push({ from: state.currentUser, type: "text", text, at: Date.now() });
        if (activeRemoteConversationId && supabaseApi()) {
          supabaseApi().sendMessage(activeRemoteConversationId, { type: "text", text }).catch(error => showToast(error.message || "远程消息发送失败。"));
        }
      }
      chat.updatedAt = Date.now();
      dom.chatInput.value = "";
      save();
      renderChat();
      renderMessages();
    }

    function handleChatImage() {
      const file = dom.chatImageInput.files && dom.chatImageInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        pendingChatAttachment = { type: "image", name: file.name, size: file.size, data: reader.result };
        renderAttachmentPreview(`图片：${file.name}`);
      };
      reader.readAsDataURL(file);
      dom.chatImageInput.value = "";
    }

    function handleChatFile() {
      const file = dom.chatFileInput.files && dom.chatFileInput.files[0];
      if (!file) return;
      pendingChatAttachment = { type: "file", name: file.name, size: file.size };
      renderAttachmentPreview(`文件：${file.name}`);
      dom.chatFileInput.value = "";
    }

    function toggleVoiceRecording() {
      if (!activeChatUserId) return;
      if (!voiceRecordingStartedAt) {
        voiceRecordingStartedAt = Date.now();
        dom.recordVoiceBtn.classList.add("recording");
        dom.recordVoiceBtn.setAttribute("aria-label", "停止录音并发送");
        dom.recordVoiceBtn.title = "停止录音并发送";
        renderAttachmentPreview("正在录音，点击“停”发送语音");
        return;
      }
      const duration = Math.max(1, Math.round((Date.now() - voiceRecordingStartedAt) / 1000));
      stopVoiceVisual();
      const chat = getChat(activeChatUserId);
      const voiceMessage = { from: state.currentUser, type: "voice", duration, at: Date.now() };
      chat.messages.push(voiceMessage);
      if (activeRemoteConversationId && supabaseApi()) {
        supabaseApi().sendMessage(activeRemoteConversationId, { type: "voice", duration }).catch(error => showToast(error.message || "远程语音发送失败。"));
      }
      chat.updatedAt = Date.now();
      save();
      clearPendingAttachment();
      renderChat();
      renderMessages();
      showToast("语音已发送。");
    }

    function stopVoiceVisual() {
      voiceRecordingStartedAt = 0;
      dom.recordVoiceBtn.classList.remove("recording");
      dom.recordVoiceBtn.setAttribute("aria-label", "发送语音");
      dom.recordVoiceBtn.title = "发送语音";
    }

    function renderAttachmentPreview(text) {
      dom.chatAttachmentPreview.innerHTML = `<span>${escapeHtml(text)}</span><button class="ghost" type="button" onclick="clearPendingAttachment()">取消</button>`;
      dom.chatAttachmentPreview.classList.add("show");
    }

    function clearPendingAttachment() {
      pendingChatAttachment = null;
      dom.chatAttachmentPreview.innerHTML = "";
      dom.chatAttachmentPreview.classList.remove("show");
    }

    function formatFileSize(size) {
      if (!size) return "文件";
      if (size < 1024) return `${size} B`;
      if (size < 1024 * 1024) return `${(size / 1024).toFixed(1)} KB`;
      return `${(size / 1024 / 1024).toFixed(1)} MB`;
    }

    function renderMessages() {
      const chats = [...state.chats].sort((a, b) => b.updatedAt - a.updatedAt);
      dom.messageList.innerHTML = `<div class="message-note"><span>私信会话</span><strong>${chats.length}</strong></div>` + (chats.length ? chats.map(chat => {
        const otherId = chat.participants.find(id => id !== state.currentUser);
        const other = userById(otherId);
        const last = chat.messages[chat.messages.length - 1];
        const unread = last && last.from !== state.currentUser;
        return `<article class="message-item ${unread ? "unread" : ""}" data-chat-user="${other.id}">
          <img class="avatar-md" src="${other.avatar}" alt="${escapeHtml(other.name)}">
          <div class="message-text">
            <strong>${escapeHtml(other.name)}</strong>
            <p>${escapeHtml(last ? lastMessagePreview(last) : "还没有消息")}</p>
            <p>${escapeHtml(publicProfileText(other) || "SJTU Seek 用户")}</p>
          </div>
          <span class="message-time">${timeAgo(chat.updatedAt)}</span>
        </article>`;
      }).join("") : `<div class="empty">暂无会话。点击广场里的“我来”即可开始私信。</div>`);
    }

    function publicProfileText(user) {
      const profile = (user && user.profile) || defaultProfile();
      return [
        profile.privacy.college === "public" && profile.college,
        profile.privacy.hobbies === "public" && profile.hobbies
      ].filter(Boolean).join(" · ");
    }

    function lastMessagePreview(msg) {
      const type = msg.type || "text";
      if (type === "image") return "[图片]";
      if (type === "file") return `[文件] ${msg.name || ""}`;
      if (type === "voice") return `[语音] ${msg.duration || 1}"`;
      return msg.text || "";
    }

    function handleMessageListClick(event) {
      const item = event.target.closest("[data-chat-user]");
      if (item) openChatWith(item.dataset.chatUser);
    }

    function renderMine() {
      const current = me();
      dom.mineAvatar.src = current.avatar;
      dom.mineName.textContent = current.name || "未命名同学";
      const compactInfo = profilePills(current, true, false);
      const bio = profileBioHtml(current, true);
      dom.mineInfo.innerHTML = `<div class="info-grid">${compactInfo.length ? compactInfo.join("") : `<span class="info-pill">饮水思源</span>`}</div>${bio}`;
      const myPosts = state.posts.filter(p => p.authorId === state.currentUser);
      const favs = state.posts.filter(p => isFav(p));
      const likes = state.posts.filter(p => isLiked(p));
      const history = state.history.map(id => state.posts.find(p => p.id === id)).filter(Boolean);
      dom.mineSections.innerHTML = [
        sectionHtml("我发布的", myPosts),
        sectionHtml("我收藏的", favs),
        sectionHtml("我的点赞", likes),
        sectionHtml("浏览历史", history),
        `<details class="mine-section" open><summary><span>个人资料</span><span class="summary-count">资料卡</span><span class="summary-arrow">›</span></summary><div class="section-body">
          <button class="primary" data-edit-profile="1">修改头像、昵称和资料</button>
          <div class="small-card">
            <h4>资料卡</h4>
            <div class="info-grid">${profilePills(current, true, false).join("") || `<span class="info-pill">还没有填写资料</span>`}</div>
            ${profileBioHtml(current, true)}
          </div>
          <div class="empty">标记为隐私的字段只会在这里展示，不会出现在其他人的资料摘要中。</div>
        </div></details>`,
        `<div class="account-actions"><button class="primary logout-btn" data-logout="1">退出登录</button></div>`
      ].join("");
    }

    function profilePills(user, includePrivate = false, withLabel = false) {
      const profile = (user && user.profile) || defaultProfile();
      const rows = [
        ["gender", "性别", profile.gender],
        ["age", "年龄", profile.age],
        ["grade", "年级", profile.grade],
        ["college", "学院", profile.college],
        ["hobbies", "爱好", profile.hobbies]
      ];
      return rows
        .filter(([key, , value]) => value && (includePrivate || profile.privacy[key] === "public"))
        .map(([key, label, value]) => {
          const normalized = key === "age" && /^\d+$/.test(String(value)) ? `${value}岁` : value;
          const text = withLabel ? `${label}：${normalized}` : normalized;
          const privacy = includePrivate && profile.privacy[key] === "private" ? " · 隐私" : "";
          return `<span class="info-pill ${profile.privacy[key] === "private" ? "privacy-pill" : ""}">${escapeHtml(text)}${privacy}</span>`;
        });
    }

    function profileBioHtml(user, includePrivate = false) {
      const profile = (user && user.profile) || defaultProfile();
      if (!profile.bio || (!includePrivate && profile.privacy.bio !== "public")) return "";
      const privacy = includePrivate && profile.privacy.bio === "private" ? " · 隐私" : "";
      return `<div class="bio-card ${profile.privacy.bio === "private" ? "private" : ""}">${escapeHtml(profile.bio)}${privacy}</div>`;
    }

    function sectionHtml(title, posts) {
      return `<details class="mine-section">
        <summary><span>${title}</span><span class="summary-count">${posts.length}</span><span class="summary-arrow">›</span></summary>
        <div class="section-body">${posts.length ? posts.map(p => postCardHtml(p, true)).join("") : `<div class="empty">这里暂时还没有内容。</div>`}</div>
      </details>`;
    }

    function handleMineClick(event) {
      if (event.target.closest("[data-logout]")) return logout();
      if (event.target.closest("[data-edit-profile]")) return openProfile();
      const card = event.target.closest("[data-open-post]");
      if (card) openPostDetail(card.dataset.openPost, true);
    }

    async function logout() {
      if (!confirm("确认退出当前账号吗？")) return;
      const client = supabaseClient();
      if (client) {
        const { error } = await client.auth.signOut();
        if (error) return showToast(authErrorMessage(error));
      }
      state.auth.loggedIn = false;
      state.auth.currentEmail = "";
      if (supabaseApi() && postsRealtimeChannel) {
        supabaseApi().removeChannel(postsRealtimeChannel);
        postsRealtimeChannel = null;
      }
      if (supabaseApi() && messagesRealtimeChannel) {
        supabaseApi().removeChannel(messagesRealtimeChannel);
        messagesRealtimeChannel = null;
      }
      save();
      dom.appScreen.classList.remove("active");
      dom.setupScreen.classList.remove("active");
      dom.detailPage.classList.remove("open");
      dom.chatPage.classList.remove("open");
      dom.appScreen.classList.remove("chat-open");
      dom.profileModal.classList.remove("open");
      dom.composerModal.classList.remove("open");
      $$(".tab-page").forEach(page => page.classList.remove("active"));
      $("#plazaPage").classList.add("active");
      $$(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === "plaza"));
      dom.loginPassword.value = "";
      dom.loginScreen.classList.add("active");
      showToast("已退出登录。");
    }

    function openProfile() {
      dom.profileAvatarPreview.src = me().avatar;
      dom.profileName.value = me().name;
      const profile = me().profile || defaultProfile();
      dom.profileGender.value = profile.gender || "";
      dom.profileAge.value = profile.age || "20";
      dom.profileGrade.value = profile.grade || "";
      dom.profileCollege.value = profile.college || "";
      dom.profileHobbies.value = profile.hobbies || "";
      dom.profileBio.value = profile.bio || "";
      dom.privacyGender.value = profile.privacy.gender || "public";
      dom.privacyAge.value = profile.privacy.age || "private";
      dom.privacyGrade.value = profile.privacy.grade || "public";
      dom.privacyCollege.value = profile.privacy.college || "public";
      dom.privacyHobbies.value = profile.privacy.hobbies || "public";
      dom.privacyBio.value = profile.privacy.bio || "public";
      dom.profileModal.classList.add("open");
    }

    async function saveProfile() {
      const name = dom.profileName.value.trim();
      if (!name) return showToast("昵称不能为空。");
      Object.assign(me(), {
        name,
        avatar: dom.profileAvatarPreview.src || avatars[0],
        profileReady: true,
        profile: {
          gender: dom.profileGender.value,
          age: dom.profileAge.value.trim(),
          grade: dom.profileGrade.value,
          college: dom.profileCollege.value,
          hobbies: dom.profileHobbies.value.trim(),
          bio: dom.profileBio.value.trim(),
          privacy: {
            gender: dom.privacyGender.value,
            age: dom.privacyAge.value,
            grade: dom.privacyGrade.value,
            college: dom.privacyCollege.value,
            hobbies: dom.privacyHobbies.value,
            bio: dom.privacyBio.value
          }
        }
      });
      save();
      try {
        await syncSupabaseProfile();
      } catch (error) {
        showToast(error.message || "同步个人资料失败。");
      }
      dom.profileModal.classList.remove("open");
      renderAll();
      showToast("个人资料已同步更新。");
    }

    function setupPullRefresh() {
      let startY = 0;
      let pulling = false;
      document.addEventListener("touchstart", event => {
        if (window.scrollY === 0) {
          startY = event.touches[0].clientY;
          pulling = true;
        }
      }, { passive: true });
      document.addEventListener("touchmove", event => {
        if (!pulling) return;
        const distance = event.touches[0].clientY - startY;
        if (distance > 70) dom.refreshTip.classList.add("show");
      }, { passive: true });
      document.addEventListener("touchend", () => {
        if (!pulling) return;
        pulling = false;
        if (dom.refreshTip.classList.contains("show")) {
          dom.refreshTip.textContent = "正在刷新...";
          setTimeout(() => {
            state = loadState();
            renderAll();
            dom.refreshTip.textContent = "已更新到最新需求帖子";
            showToast("已更新到最新需求帖子。");
            setTimeout(() => {
              dom.refreshTip.classList.remove("show");
              dom.refreshTip.textContent = "正在刷新...";
            }, 900);
          }, 500);
        }
      }, { passive: true });
    }

    init();
  </script>
</body>
</html>
